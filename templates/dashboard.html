<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <style>
        /* Basic reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* Body styling */
        body {
            background-color: #f3f3f3;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        /* Dashboard container */
        .dashboard-container {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 80%;
            max-width: 600px;
            text-align: center;
            border-top: 5px solid #FF9933; /* Saffron color */
            border-bottom: 5px solid #138808; /* Green color */
        }

        h2 {
            color: #FF9933; /* Saffron color for the header */
            margin-bottom: 15px;
        }

        p {
            margin-bottom: 10px;
        }

        /* Error and success messages */
        .error {
            color: red;
        }

        .success {
            color: green;
        }

        /* Form styling */
        form {
            margin-top: 20px;
        }

        label {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        select {
            padding: 8px;
            width: 100%;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #138808; /* Green color */
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0f6b06; /* Darker green on hover */
        }

        /* Logout link styling */
        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #0056b3;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h2>Welcome, {{ user['name'] }}!</h2>
        <p>Email: {{ user['email'] }}</p>
        <p>Phone: {{ user['phone'] }}</p>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        {% if success %}
            <p class="success">{{ success }}</p>
        {% endif %}
        <form method="POST" action="/dashboard">
            <label for="party">Choose a party to vote for:</label>
            <select name="party" required>
                {% for party in parties %}
                    <option value="{{ party }}">{{ party }}</option>
                {% endfor %}
            </select>
            <button type="submit">Submit Vote</button>
        </form>
        <a href="/logout">Logout</a>
    </div>
</body>
</html>
